name: "Discover new PDSes from upstream"
on:
  schedule:
    - cron: "0 0 * * *"

env:
  RELAY_ADMIN_PASSWORD: ${{ secrets.RELAY_ADMIN_PASSWORD }}
  RELAY_HOST: ${{ secrets.RELAY_HOST }}

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2

      - name: run crawl
        run: deno run discover
